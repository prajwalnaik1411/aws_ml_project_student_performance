<html>

<head>
    <title>Student Performance</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            margin: 0;
            padding: 0;
        }

```
    .login {
        width: 520px;
        margin: 50px auto;
        padding: 35px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0px 12px 30px rgba(0, 0, 0, 0.25);
    }

    h1 {
        text-align: center;
        color: #1e3c72;
        font-weight: 700;
    }

    legend {
        font-size: 20px;
        font-weight: bold;
        color: #2a5298;
    }

    .mb-3 {
        margin-bottom: 18px;
    }

    .form-label {
        font-weight: 600;
        display: block;
        margin-bottom: 6px;
        color: #333;
    }

    .form-control {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        transition: all 0.3s ease;
        font-size: 14px;
    }

    .form-control:focus {
        border-color: #2a5298;
        outline: none;
        box-shadow: 0px 0px 8px rgba(42, 82, 152, 0.5);
    }

    .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #ff7e5f, #feb47b);
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.03);
        background: linear-gradient(135deg, #ff6a4a, #fca65a);
    }

    h2 {
        text-align: center;
        margin-top: 25px;
        color: #2a5298;
        font-weight: 600;
    }
</style>
```

</head>

<body>
    <div class="login">
        <h1>🎓 Student Exam Performance Indicator</h1>

```
    <form action="{{ url_for('predict_datapoint')}}" method="post">
        <h1>
            <legend>Prediction Form</legend>
        </h1>

        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-control" name="gender" required>
                <option selected disabled value="">Select your Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Race or Ethnicity</label>
            <select class="form-control" name="ethnicity" required>
                <option selected disabled value="">Select Ethnicity</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Parental Level of Education</label>
            <select class="form-control" name="parental_level_of_education" required>
                <option selected disabled value="">Select Parent Education</option>
                <option value="associate's degree">associate's degree</option>
                <option value="bachelor's degree">bachelor's degree</option>
                <option value="high school">high school</option>
                <option value="master's degree">master's degree</option>
                <option value="some college">some college</option>
                <option value="some high school">some high school</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Lunch Type</label>
            <select class="form-control" name="lunch" required>
                <option selected disabled value="">Select Lunch Type</option>
                <option value="free/reduced">free/reduced</option>
                <option value="standard">standard</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Test preparation Course</label>
            <select class="form-control" name="test_preparation_course" required>
                <option selected disabled value="">Select Test_course</option>
                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Reading Score</label>
            <input class="form-control" type="number" name="reading_score" placeholder="Enter Reading score" min='0'
                max='100' />
        </div>

        <div class="mb-3">
            <label class="form-label">Writing Score</label>
            <input class="form-control" type="number" name="writing_score" placeholder="Enter Writing score" min='0'
                max='100' />
        </div>

        <div class="mb-3">
            <input class="btn" type="submit" value="🚀 Predict Maths Score" />
        </div>
    </form>

    <h2>
        📊 Prediction: {{results}}
    </h2>
</div>
```

</body>

</html>
